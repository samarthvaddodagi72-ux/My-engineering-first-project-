<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="decoration-container">
        <div class="balloon pink"></div>
        <div class="balloon white"></div>
        <div class="balloon pink-light"></div>
        <div class="balloon white" style="left: 80%;"></div>
        
        <div class="banner-container">
            <div class="banner-row">
                <span class="flag">H</span>
                <span class="flag">A</span>
                <span class="flag">P</span>
                <span class="flag">P</span>
                <span class="flag">Y</span>
            </div>
            <div class="banner-row">
                <span class="flag">B</span>
                <span class="flag">I</span>
                <span class="flag">R</span>
                <span class="flag">T</span>
                <span class="flag">H</span>
                <span class="flag">D</span>
                <span class="flag">A</span>
                <span class="flag">Y</span>
            </div>
        </div>

        <div class="content">
            <h1 id="name-display">Celebrating You!</h1>
            <p>Click the button below for a special message.</p>
            <button id="wish-btn">Activate Birthday AI</button>
        </div>

        <div class="honeycomb left"></div>
        <div class="honeycomb right"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
