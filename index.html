<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="birthday-song" src="1.mp3.m4a" loop></audio>

    <div class="lighting-overlay"></div>

    <div class="decoration-container">
        <div class="banner-container">
            <div class="banner-row">
                <span class="flag">H</span><span class="flag">A</span><span class="flag">P</span><span class="flag">P</span><span class="flag">Y</span>
            </div>
            <div class="banner-row">
                <span class="flag">B</span><span class="flag">I</span><span class="flag">R</span><span class="flag">T</span><span class="flag">H</span><span class="flag">D</span><span class="flag">A</span><span class="flag">Y</span>
            </div>
        </div>

        <div class="photo-frame">
            <img src="1.jpg" alt="Birthday Friend">
        </div>

        <div id="fireworks-container"></div>
        <div class="flower-pond"></div>
    </div>

    <div id="start-overlay">
        <div class="start-content">
            <h1>💖 Open Your Surprise 💖</h1>
            <p>(Tap to start the celebration)</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
